name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  validate_tag:
    name: Validate tag target
    runs-on: ubuntu-latest
    outputs:
      is_on_master: ${{ steps.check.outputs.is_on_master }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check tag commit is on master
        id: check
        run: |
          git fetch origin master --depth=1

          if git merge-base --is-ancestor "${GITHUB_SHA}" "origin/master"; then
            echo "is_on_master=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Tag ${GITHUB_REF} does not point to a commit on master."
          echo "is_on_master=false" >> "${GITHUB_OUTPUT}"
          exit 1

  lint:
    name: Lint
    needs: validate_tag
    if: needs.validate_tag.outputs.is_on_master == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run lint
        run: yarn lint

      - name: Check types
        run: yarn check:types

  build:
    name: Build
    needs: validate_tag
    if: needs.validate_tag.outputs.is_on_master == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

  unit_tests:
    name: Tests
    needs:
      - validate_tag
      - lint
    if: needs.validate_tag.outputs.is_on_master == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Pull Docker images
        run: docker compose -f docker-compose.yml pull

      - name: Run tests
        run: yarn test

  npm_release:
    name: NPM release
    needs:
      - validate_tag
      - lint
      - build
      - unit_tests
    if: needs.validate_tag.outputs.is_on_master == 'true'
    runs-on: ubuntu-latest
    environment: privileged
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare release package
        run: yarn prepare:release

      - run: npm install -g npm@latest

      - name: Publish package
        run: npm publish release/

      - name: Create GitHub release
        run: node ./pipeline/updateGithubRelease.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref }}
