trigger:
  tags:
    include:
      - 'v*'

  branches:
    include:
      - master

pr:
  branches:
    include:
      - master

variables:
  - group: secrets
  - name: COMPOSE_FILE
    value: docker-compose.yml

jobs:
  - job: lint
    displayName: Lint
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - task: NodeTool@0
        inputs:
          versionSpec: '18.x'
      - bash: yarn install
        displayName: yarn install
      - bash: yarn lint
        displayName: yarn lint
      - bash: yarn check:types
        displayName: Check type

  - job: build
    displayName: Build
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - task: NodeTool@0
        inputs:
          versionSpec: '18.x'
      - bash: yarn install
        displayName: yarn install
      - bash: yarn build
        displayName: yarn build

  - job: unit_tests
    displayName: Tests
    dependsOn: lint
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - task: NodeTool@0
        inputs:
          versionSpec: '18.x'
      - bash: yarn install
        displayName: yarn install
      - bash: docker compose -f ${COMPOSE_FILE} pull
        displayName: docker compose pull
      - bash: yarn test
        displayName: integration test with docker compose
